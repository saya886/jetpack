openapi: 3.1.0
info:
  title: Jetpack API
  version: 0.1.0
  description: Backend API for the Jetpack side-scrolling platform game.
paths:
  /health:
    get:
      tags:
        - system
      summary: Health check
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ok
  /api/v1/status:
    get:
      tags:
        - system
      summary: Project status
      responses:
        '200':
          description: Current initialization status.
          content:
            application/json:
              schema:
                type: object
                required:
                  - name
                  - stage
                  - message
                properties:
                  name:
                    type: string
                    example: Jetpack
                  stage:
                    type: string
                    example: project-initialized
                  message:
                    type: string
                    example: Project structure is ready. Gameplay is not implemented yet.

